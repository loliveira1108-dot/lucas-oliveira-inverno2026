<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Lookbook interativo de estampas" />
  <title>LO0500_V1 — Lookbook</title>

  <style>
    :root {
      --bg: #f3f1ec;
      --ink: #151515;
      --muted: #77736b;
      --line: rgba(21, 21, 21, .18);
      --panel: rgba(255, 255, 255, .50);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    body {
      overflow: hidden;
    }

    button { font: inherit; }

    .page {
      width: 100%;
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 2.6vw, 42px);
      gap: 18px;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      position: relative;
      z-index: 10;
    }

    .brand {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .counter {
      font-size: 12px;
      letter-spacing: .12em;
      font-variant-numeric: tabular-nums;
    }

    .stage {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(280px, 1.15fr) minmax(300px, .85fr);
      align-items: stretch;
      gap: clamp(22px, 4vw, 74px);
    }

    .model-panel,
    .print-panel {
      min-height: 0;
      position: relative;
      border-top: 1px solid var(--line);
    }

    .model-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .model-wrap {
      position: relative;
      height: 100%;
      width: auto;
      max-width: 100%;
      min-height: 0;

      /*
        A proporção real da imagem é definida pelo JavaScript.
        Modelo, máscara, textura e sombras passam a usar exatamente
        o mesmo sistema de coordenadas no desktop e no mobile.
      */
      aspect-ratio: var(--model-aspect, 1 / 3);
      flex: 0 1 auto;
    }

    .model-base,
    .dress-svg,
    .dress-shading {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .model-base {
      object-fit: contain;
      object-position: center;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    /*
      Modelo, máscara, textura e sombras compartilham o mesmo
      sistema de coordenadas da imagem MODELO.png.
    */
    .dress-svg {
      z-index: 2;
      display: block;
      overflow: hidden;
      pointer-events: none;
    }

    .dress-svg-texture {
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .dress-shading {
      object-fit: contain;
      object-position: center;
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: multiply;
      opacity: .55;
    }

    .print-panel {
      min-height: 0;
      position: relative;
      border-top: 1px solid var(--line);
    }

    .print-panel {
      display: grid;
      align-content: center;
      gap: clamp(18px, 2.5vw, 34px);
    }

    .title-block {
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 12ch;
      font-size: clamp(38px, 6vw, 92px);
      font-weight: 500;
      line-height: .92;
      letter-spacing: -.055em;
      overflow-wrap: anywhere;
      transition: opacity .25s ease, transform .5s var(--ease);
    }

    .print-frame {
      width: 100%;
      aspect-ratio: 3 / 1;
      position: relative;
      overflow: visible;
      border: 1px solid var(--line);
      background: #ddd;
      box-shadow: 0 18px 50px rgba(0,0,0,.08);
    }

    .print-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .35s ease, transform .75s var(--ease);
    }

    .dimensions {
      position: absolute;
      inset: auto 12px 10px auto;
      padding: 6px 8px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(8px);
      font-size: 10px;
      letter-spacing: .10em;
    }

    .hint {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      letter-spacing: .06em;
    }

    .progress {
      flex: 1;
      height: 1px;
      background: var(--line);
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--ink);
      transition: width .6s var(--ease);
    }

    .nav {
      display: flex;
      gap: 8px;
    }

    .nav button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }

    .nav button:hover {
      background: var(--ink);
      color: var(--bg);
    }

    .is-changing h1,
    .is-changing .print-image {
      opacity: 0;
      transform: translateY(12px) scale(1.015);
    }

    /* MOBILE EM PÉ: tudo cabe em uma única tela */
    @media (max-width: 780px) and (orientation: portrait) {
      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        overflow: hidden;
      }

      .page {
        width: 100%;
        height: 100svh;
        min-height: 100svh;
        display: grid;
        grid-template-rows: 32px minmax(0, 1fr) 38px;
        padding: 10px 14px 8px;
        gap: 8px;
        overflow: hidden;
      }

      .topbar {
        min-height: 0;
        margin: 0;
      }

      .brand {
        max-width: 70%;
        font-size: 8px;
        line-height: 1.2;
        letter-spacing: .14em;
      }

      .counter {
        font-size: 9px;
      }

      .stage {
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 64%) minmax(0, 36%);
        gap: 8px;
      }

      .model-panel {
        min-height: 0;
        height: auto;
        overflow: hidden;
      }

      .model-wrap {
        min-height: 0;
        height: 100%;
        width: auto;
        max-width: 100%;
      }

      .model-base,
      .dress-svg,
      .dress-shading {
        width: 100%;
        height: 100%;
      }

      .model-base,
      .dress-shading {
        object-fit: contain;
        object-position: center center;
      }


      .print-panel {
        min-height: 0;
        padding: 9px 0 0;
        display: grid;
        grid-template-rows: auto auto auto;
        align-content: start;
        gap: 7px;
        overflow: hidden;
      }

      .title-block {
        gap: 3px;
      }

      .eyebrow {
        font-size: 7px;
        line-height: 1.2;
        letter-spacing: .14em;
      }

      h1 {
        max-width: 100%;
        font-size: clamp(30px, 11.5vw, 48px);
        line-height: .88;
        letter-spacing: -.055em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
      }

      .print-frame {
        width: 100%;
        aspect-ratio: 3 / 1;
        overflow: hidden;
        box-shadow: 0 7px 20px rgba(0,0,0,.07);
      }

      .print-image {
        object-fit: cover;
      }

      .dimensions {
        right: 6px;
        bottom: 5px;
        padding: 3px 5px;
        font-size: 7px;
      }

      .hint {
        max-width: 100%;
        font-size: 7px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
      }

      .footer {
        min-height: 0;
        margin: 0;
        padding: 0;
        gap: 10px;
      }

      .progress {
        min-width: 0;
      }

      .nav {
        gap: 5px;
      }

      .nav button {
        width: 34px;
        height: 34px;
        background: rgba(243, 241, 236, .94);
        touch-action: manipulation;
      }
    }

    /* CELULARES MUITO ESTREITOS */
    @media (max-width: 390px) and (orientation: portrait) {
      .page {
        padding-inline: 10px;
      }

      .stage {
        grid-template-rows: minmax(0, 62%) minmax(0, 38%);
      }

      h1 {
        font-size: clamp(28px, 11vw, 43px);
      }

      .nav button {
        width: 32px;
        height: 32px;
      }
    }

    /* MOBILE DEITADO: duas colunas compactas dentro da viewport */
    @media (max-height: 600px) and (orientation: landscape) {
      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        overflow: hidden;
      }

      .page {
        width: 100%;
        height: 100svh;
        min-height: 100svh;
        display: grid;
        grid-template-rows: 24px minmax(0, 1fr) 28px;
        padding: 7px 12px 6px;
        gap: 5px;
        overflow: hidden;
      }

      .topbar {
        min-height: 0;
      }

      .brand {
        font-size: 7px;
        letter-spacing: .13em;
      }

      .counter {
        font-size: 8px;
      }

      .stage {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, .9fr) minmax(0, 1.1fr);
        grid-template-rows: 1fr;
        gap: 18px;
        align-items: stretch;
      }

      .model-panel,
      .print-panel {
        min-height: 0;
        height: auto;
      }

      .model-panel {
        overflow: hidden;
      }

      .model-wrap,
      .model-base,
      .dress-svg,
      .dress-shading {
        width: 100%;
        height: 100%;
      }

      .model-base,
      .dress-shading {
        object-fit: contain;
        object-position: center center;
      }

      .print-panel {
        padding: 8px 0 0;
        display: grid;
        grid-template-rows: auto auto auto;
        align-content: center;
        gap: 7px;
        overflow: hidden;
      }

      .title-block {
        gap: 3px;
      }

      .eyebrow {
        font-size: 7px;
        line-height: 1.2;
      }

      h1 {
        max-width: 100%;
        font-size: clamp(28px, 6.8vw, 52px);
        line-height: .9;
        letter-spacing: -.055em;
        white-space: nowrap;
        overflow: hidden;
      }

      .print-frame {
        width: 100%;
        aspect-ratio: 3 / 1;
        overflow: hidden;
        box-shadow: 0 7px 18px rgba(0,0,0,.07);
      }

      .dimensions {
        right: 6px;
        bottom: 5px;
        padding: 3px 5px;
        font-size: 7px;
      }

      .hint {
        font-size: 7px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
      }

      .footer {
        min-height: 0;
        margin: 0;
        padding: 0;
        gap: 8px;
      }

      .nav {
        gap: 4px;
      }

      .nav button {
        width: 26px;
        height: 26px;
        font-size: 11px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="page" id="app">
    <header class="topbar">
      <div class="brand">LUCAS OLIVEIRA / INVERNO 2026</div>
      <div class="counter" aria-live="polite">
        <span id="current">01</span> / <span id="total">03</span>
      </div>
    </header>

    <section class="stage">
      <div class="model-panel">
        <div class="model-wrap">

          <img
            class="model-base"
            id="modelBase"
            src="assets/MODELO.png"
            alt="Modelo vestindo a estampa selecionada"
          />

          <svg
            xmlns:xlink="http://www.w3.org/1999/xlink"
            class="dress-svg"
            id="dressSvg"
            aria-hidden="true"
            preserveAspectRatio="xMidYMid meet"
          >
            <defs>
              <mask
                id="dressMaskSvg"
                maskUnits="userSpaceOnUse"
                maskContentUnits="userSpaceOnUse"
                style="mask-type: alpha"
              >
                <image
                  id="dressMaskImage"
                  href="assets/dress-mask.png"
                  x="0"
                  y="0"
                  width="1"
                  height="1"
                  preserveAspectRatio="none"
                />
              </mask>
            </defs>

            <g mask="url(#dressMaskSvg)">
<image
                class="dress-svg-texture"
                id="dressTexture"
                href="assets/LO0500_V1.jpg"
                xlink:href="assets/LO0500_V1.jpg"
                preserveAspectRatio="xMidYMid slice"
              />
            </g>
          </svg>

          <img
            class="dress-shading"
            src="assets/dress-shading.png"
            alt=""
            aria-hidden="true"
          />

        </div>
      </div>

      <article class="print-panel">
        <div class="title-block">
          <p class="eyebrow">Referência da estampa</p>
          <h1 id="printTitle">LO0500_V1</h1>
        </div>

        <div class="print-frame">
          <img
            class="print-image"
            id="printImage"
            src="assets/LO0500_V1.jpg"
            alt="Rapport da estampa LO0500_V1"
          />
          <span class="dimensions">1,50 × 0,50 m</span>
        </div>

        <div class="hint">
          Role o mouse, deslize para cima/baixo ou use as setas do teclado.
        </div>
      </article>
    </section>

    <footer class="footer">
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      <nav class="nav" aria-label="Navegação entre estampas">
        <button id="prev" type="button" aria-label="Estampa anterior">↑</button>
        <button id="next" type="button" aria-label="Próxima estampa">↓</button>
      </nav>
    </footer>
  </main>

  <script>
    /*
      EDITE SOMENTE ESTA LISTA PARA ADICIONAR SUAS ESTAMPAS.

      title: referência que aparece como título
      image: arquivo do retângulo 1,50 × 0,50
      artHeightRatio: altura da arte em relação à altura útil do vestido
      textureScale: ajuste fino de escala
      textureX/textureY: ajuste fino relativo à área do vestido
      textureRotation: use 0deg para arquivos verticais e 90deg para horizontais
    */
    const estampas = [
      {
        title: "LO0500_V1",
        image: "assets/LO0500_V1.jpg",
        artHeightRatio: 1.25,
        textureScale: 1.35,
        textureX: "0%",
        textureY: "-25%",
        textureRotation: "90deg"
      },
      {
        title: "REF. 002",
        image: "assets/estampa-02.svg",
        artHeightRatio: 1.25,
        textureScale: 1,
        textureX: "0%",
        textureY: "0%",
        textureRotation: "90deg"
      },
      {
        title: "REF. 003",
        image: "assets/estampa-03.svg",
        artHeightRatio: 1.25,
        textureScale: 1,
        textureX: "0%",
        textureY: "0%",
        textureRotation: "90deg"
      }
    ];

    const app = document.querySelector("#app");
    const title = document.querySelector("#printTitle");
    const printImage = document.querySelector("#printImage");
    const dressSvg = document.querySelector("#dressSvg");
    const dressTexture = document.querySelector("#dressTexture");
    const dressMaskImage = document.querySelector("#dressMaskImage");
    const modelBase = document.querySelector("#modelBase");

    const maskProbe = new Image();
    maskProbe.src = "assets/dress-mask.png";

    // Fallback para os arquivos atuais (449 × 1402).
    let maskBounds = {
      left: 13,
      top: 291,
      right: 434,
      bottom: 1260,
      width: 422,
      height: 970
    };
    const modelWrap = document.querySelector(".model-wrap");
    const currentLabel = document.querySelector("#current");
    const totalLabel = document.querySelector("#total");
    const progressBar = document.querySelector("#progressBar");
    const prevButton = document.querySelector("#prev");
    const nextButton = document.querySelector("#next");

    let index = 0;
    let locked = false;
    let wheelAccumulator = 0;
    let touchStartY = 0;

    totalLabel.textContent = String(estampas.length).padStart(2, "0");

    function syncMaskBounds() {
      if (!maskProbe.naturalWidth || !maskProbe.naturalHeight) {
        applyTextureSettings(estampas[index < 0 ? 0 : index]);
        return;
      }

      try {
        const canvas = document.createElement("canvas");
        canvas.width = maskProbe.naturalWidth;
        canvas.height = maskProbe.naturalHeight;

        const context = canvas.getContext("2d", {
          willReadFrequently: true
        });

        context.drawImage(maskProbe, 0, 0);

        const pixels = context.getImageData(
          0,
          0,
          canvas.width,
          canvas.height
        ).data;

        let left = canvas.width;
        let top = canvas.height;
        let right = -1;
        let bottom = -1;

        for (let y = 0; y < canvas.height; y += 1) {
          for (let x = 0; x < canvas.width; x += 1) {
            const alpha = pixels[(y * canvas.width + x) * 4 + 3];

            if (alpha > 16) {
              if (x < left) left = x;
              if (x > right) right = x;
              if (y < top) top = y;
              if (y > bottom) bottom = y;
            }
          }
        }

        if (right >= left && bottom >= top) {
          maskBounds = {
            left,
            top,
            right,
            bottom,
            width: right - left + 1,
            height: bottom - top + 1
          };
        }
      } catch (error) {
        /*
          Se o navegador impedir a leitura do PNG, o lookbook usa
          os limites de segurança definidos em maskBounds.
        */
        console.warn(
          "Não foi possível ler os limites da máscara; usando fallback.",
          error
        );
      }

      applyTextureSettings(estampas[index < 0 ? 0 : index]);
    }

    if (maskProbe.complete) {
      syncMaskBounds();
    } else {
      maskProbe.addEventListener("load", syncMaskBounds, { once: true });
    }

    function syncModelGeometry() {
      if (!modelBase.naturalWidth || !modelBase.naturalHeight) return;

      const width = modelBase.naturalWidth;
      const height = modelBase.naturalHeight;

      modelWrap.style.setProperty("--model-aspect", `${width} / ${height}`);

      dressSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      dressMaskImage.setAttribute("width", width);
      dressMaskImage.setAttribute("height", height);

      applyTextureSettings(estampas[index < 0 ? 0 : index]);
    }

    if (modelBase.complete) {
      syncModelGeometry();
    } else {
      modelBase.addEventListener("load", syncModelGeometry, { once: true });
    }

    function updatePageTitle(item) {
      document.title = `${item.title} — Lookbook`;
    }

    function applyTextureSettings(item) {
      if (!modelBase.naturalWidth || !modelBase.naturalHeight) return;

      const ratio = item.artHeightRatio ?? 1.25;
      const scale = item.textureScale ?? 1;
      const offsetX = parseFloat(item.textureX || "0") / 100;
      const offsetY = parseFloat(item.textureY || "0") / 100;
      const rotation = parseFloat(item.textureRotation || "90");

      /*
        A arte física mede 150 × 50 cm, portanto a caixa original
        é sempre 3:1. O preserveAspectRatio="slice" preenche a caixa
        sem distorção e corta somente o excesso da imagem.

        Como a arte é girada 90°, sua dimensão longa passa a ocupar
        a altura do vestido. A borda direita original vira a barra.
      */
      const longSide = maskBounds.height * ratio * scale;
      const shortSide = longSide / 3;

      const centerX =
        maskBounds.left +
        maskBounds.width / 2 +
        maskBounds.width * offsetX;

      const centerY =
        maskBounds.bottom -
        longSide / 2 +
        maskBounds.height * offsetY;

      dressTexture.setAttribute("href", item.image);
      dressTexture.setAttributeNS(
        "http://www.w3.org/1999/xlink",
        "xlink:href",
        item.image
      );

      dressTexture.setAttribute("x", -longSide / 2);
      dressTexture.setAttribute("y", -shortSide / 2);
      dressTexture.setAttribute("width", longSide);
      dressTexture.setAttribute("height", shortSide);

      dressTexture.setAttribute(
        "transform",
        `translate(${centerX} ${centerY}) rotate(${rotation})`
      );
    }

    function render(nextIndex, direction = 1) {
      const safeIndex = (nextIndex + estampas.length) % estampas.length;
      if (safeIndex === index && title.textContent) return;

      locked = true;
      app.classList.add("is-changing");

      window.setTimeout(() => {
        index = safeIndex;
        const item = estampas[index];

        title.textContent = item.title;
        printImage.src = item.image;
        printImage.alt = `Rapport da estampa ${item.title}`;
applyTextureSettings(item);
        currentLabel.textContent = String(index + 1).padStart(2, "0");
        progressBar.style.width = `${((index + 1) / estampas.length) * 100}%`;
        updatePageTitle(item);

        app.classList.remove("is-changing");

        window.setTimeout(() => {
          locked = false;
        }, 420);
      }, 220);
    }

    function change(step) {
      if (locked) return;
      render(index + step, step);
    }

    window.addEventListener("wheel", (event) => {
      if (window.matchMedia("(max-width: 780px)").matches) return;

      event.preventDefault();
      wheelAccumulator += event.deltaY;

      if (Math.abs(wheelAccumulator) > 55) {
        change(wheelAccumulator > 0 ? 1 : -1);
        wheelAccumulator = 0;
      }
    }, { passive: false });

    window.addEventListener("keydown", (event) => {
      if (["ArrowDown", "ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        change(1);
      }
      if (["ArrowUp", "ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        change(-1);
      }
    });

    let touchStartX = 0;

    window.addEventListener("touchstart", (event) => {
      touchStartY = event.changedTouches[0].clientY;
      touchStartX = event.changedTouches[0].clientX;
    }, { passive: true });

    window.addEventListener("touchend", (event) => {
      const deltaY = touchStartY - event.changedTouches[0].clientY;
      const deltaX = touchStartX - event.changedTouches[0].clientX;

      if (Math.abs(deltaY) > 60 && Math.abs(deltaY) > Math.abs(deltaX)) {
        change(deltaY > 0 ? 1 : -1);
      }
    }, { passive: true });

    prevButton.addEventListener("click", () => change(-1));
    nextButton.addEventListener("click", () => change(1));

    function refreshResponsiveTexture() {
      syncModelGeometry();
      applyTextureSettings(estampas[index < 0 ? 0 : index]);
    }

    window.addEventListener("resize", refreshResponsiveTexture);
    window.addEventListener("orientationchange", refreshResponsiveTexture);

    // Primeira renderização
    index = -1;
    render(0);
  </script>
</body>
</html>
